<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ausgang – Personenzähler</title>
<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }

  :root {
    --espresso:  #1C1008;
    --roast:     #3B1F0A;
    --crema:     #C8862A;
    --foam:      #F5ECD7;
    --milk:      #FBF6EE;
    --steam:     #E8D9BE;
  }

  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--espresso); color: var(--foam);
    overflow: hidden;
  }
  #setup {
    position: fixed; inset: 0;
    background: var(--espresso);
    display: flex; align-items: center; justify-content: center;
    z-index: 20;
  }
  #setupBox {
    width: 90%; max-width: 420px;
    display: flex; flex-direction: column; gap: 14px;
  }
  #setupBox h2 { font-family: 'Playfair Display', serif; margin: 0 0 4px 0; text-align: center; }
  #setupBox input {
    padding: 14px; font-size: 1rem; border-radius: 10px; border: 1px solid var(--steam); outline: none;
    background: var(--milk); color: var(--espresso);
  }
  #setupBox button {
    padding: 16px; font-size: 1.1rem; font-weight: 700; border: none;
    border-radius: 12px; cursor: pointer; background: var(--crema); color: var(--espresso);
  }
  #setupStatus { color: var(--steam); font-size: 0.85rem; text-align: center; min-height: 1.2em; }
  #scanBtn {
    padding: 16px; font-size: 1.1rem; font-weight: 700; border: none;
    border-radius: 12px; cursor: pointer; background: var(--roast); color: var(--foam);
  }
  #scanOverlay {
    position: fixed; inset: 0; background: var(--espresso); z-index: 40;
    display: none; align-items: center; justify-content: center; flex-direction: column;
  }
  #scanOverlay video { width: 100%; max-width: 480px; border-radius: 12px; }
  #scanOverlay button {
    margin-top: 16px; padding: 12px 24px; border-radius: 10px; border: none;
    background: var(--steam); color: var(--espresso); font-weight: 700; cursor: pointer;
  }
  #scanHint { color: var(--foam); margin-top: 12px; font-size: 0.9rem; }

  #clickScreen {
    display: none;
    width: 100%; height: 100vh;
    align-items: center; justify-content: center;
  }
  #clickBtn {
    width: 90vw; height: 90vh;
    font-family: 'Playfair Display', serif;
    font-size: 4rem; font-weight: 700;
    border: none; border-radius: 24px;
    cursor: pointer; background: #8A2E1F; color: var(--foam);
    transition: transform 0.1s ease;
  }
  #clickBtn:active { transform: scale(0.96); background: #6E2418; }
  #flash {
    position: fixed; inset: 0; background: var(--foam); opacity: 0;
    pointer-events: none; transition: opacity 0.15s ease;
  }
</style>
</head>
<body>

  <div id="setup">
    <div id="setupBox">
      <h2>Ausgang einrichten</h2>
      <input id="apiKeyInput" type="text" placeholder="Ably API Key">
      <input id="roomInput" type="text" placeholder="Raum-Name (z.B. saal1)">
      <button id="scanBtn">📷 QR-Code scannen</button>
      <button id="connectBtn">Manuell verbinden</button>
      <div id="setupStatus"></div>
    </div>
  </div>

  <div id="scanOverlay">
    <video id="scanVideo" playsinline autoplay muted></video>
    <div id="scanHint">Auf den QR-Code am Eingang-Bildschirm richten...</div>
    <button id="cancelScan">Abbrechen</button>
  </div>

  <div id="clickScreen">
    <button id="clickBtn">RAUS</button>
  </div>
  <div id="flash"></div>

<script>
  const $ = id => document.getElementById(id);
  let ably, channel;

  $('apiKeyInput').value = localStorage.getItem('ably_key') || '';
  $('roomInput').value = localStorage.getItem('ably_room') || '';

  function connect(apiKey, room) {
    localStorage.setItem('ably_key', apiKey);
    localStorage.setItem('ably_room', room);
    ably = new Ably.Realtime(apiKey);
    channel = ably.channels.get('personenzaehler-' + room);
    return new Promise((resolve, reject) => {
      ably.connection.on('connected', resolve);
      ably.connection.on('failed', reject);
    });
  }

  async function init() {
    const apiKey = $('apiKeyInput').value.trim();
    const room = $('roomInput').value.trim();
    if (!apiKey || !room) {
      $('setupStatus').textContent = 'Bitte API Key und Raum-Name eingeben.';
      return;
    }
    $('setupStatus').textContent = 'Verbinde...';
    try {
      await connect(apiKey, room);
    } catch (e) {
      $('setupStatus').textContent = 'Verbindung fehlgeschlagen.';
      return;
    }
    $('setup').style.display = 'none';
    $('clickScreen').style.display = 'flex';
  }

  $('connectBtn').onclick = init;

  // --- QR-Scan ---
  let scanStream = null;
  let scanRAF = null;

  async function startScan() {
    $('scanOverlay').style.display = 'flex';
    try {
      scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    } catch (e) {
      $('scanHint').textContent = 'Kamera-Zugriff nicht möglich. Bitte manuell eintragen.';
      return;
    }
    const video = $('scanVideo');
    video.srcObject = scanStream;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) {
          try {
            const parsed = JSON.parse(code.data);
            if (parsed.k && parsed.r) {
              $('apiKeyInput').value = parsed.k;
              $('roomInput').value = parsed.r;
              stopScan();
              init();
              return;
            }
          } catch (e) { /* kein gültiger QR-Inhalt, weiter scannen */ }
        }
      }
      scanRAF = requestAnimationFrame(tick);
    }
    scanRAF = requestAnimationFrame(tick);
  }

  function stopScan() {
    if (scanRAF) cancelAnimationFrame(scanRAF);
    if (scanStream) scanStream.getTracks().forEach(t => t.stop());
    $('scanOverlay').style.display = 'none';
  }

  $('scanBtn').onclick = startScan;
  $('cancelScan').onclick = stopScan;

  $('clickBtn').onclick = () => {
    if (!channel) return;
    channel.publish('decrement', {});
    const flash = $('flash');
    flash.style.opacity = '0.3';
    setTimeout(() => flash.style.opacity = '0', 150);
  };
</script>
</body>
</html>
