<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schlüsselverwaltung</title>
<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }

  :root {
    --espresso:  #1C1008;
    --roast:     #3B1F0A;
    --crema:     #C8862A;
    --foam:      #F5ECD7;
    --milk:      #FBF6EE;
    --steam:     #E8D9BE;
  }

  html, body {
    margin: 0; padding: 0; min-height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--espresso); color: var(--foam);
  }
  h1, h2, h3 { font-family: 'Playfair Display', serif; margin: 0; }

  /* Kopfleiste */
  #topbar {
    position: sticky; top: 0; z-index: 15;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; background: var(--roast);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  #topbar h1 { font-size: 1.3rem; }
  #topAddBtn {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--crema); color: var(--espresso); border: none;
    font-size: 1.5rem; font-weight: 700; cursor: pointer; line-height: 1;
  }
  #syncStatus {
    font-size: 0.75rem; color: var(--steam); text-align: center;
    padding: 6px 12px; min-height: 1.2em;
  }

  #app { max-width: 560px; margin: 0 auto; padding: 20px 16px 60px; }

  .card {
    background: var(--roast); border-radius: 14px; padding: 18px;
    margin-bottom: 14px;
  }
  .card .name { font-weight: 700; font-size: 1.1rem; }
  .card .row { display: flex; gap: 10px; margin-top: 12px; }
  .card input {
    flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--steam); outline: none;
    background: var(--milk); color: var(--espresso);
  }
  .card button {
    padding: 12px 16px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer;
  }
  .btn-unlock { background: var(--crema); color: var(--espresso); }
  .btn-copy { background: #2E6B1F; color: #fff; }
  .btn-delete { background: #8A2E1F; color: #fff; }
  .btn-pin { background: var(--steam); color: var(--espresso); }
  .card .name.unnamed { color: var(--steam); font-style: italic; font-weight: 500; }
  .card .msg { font-size: 0.8rem; color: var(--crema); margin-top: 8px; min-height: 1.1em; }

  .keyReveal {
    margin-top: 10px; padding: 10px; background: var(--milk); color: var(--espresso);
    border-radius: 8px; font-family: monospace; font-size: 0.85rem; word-break: break-all;
    cursor: pointer;
  }

  #addOverlay {
    position: fixed; inset: 0; background: rgba(28,16,8,0.85);
    display: none; align-items: center; justify-content: center; z-index: 30;
  }
  #addBox {
    background: var(--roast); border-radius: 16px; padding: 24px;
    width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 12px;
  }
  #addBox h3 { text-align: center; }
  #addBox input {
    padding: 12px; border-radius: 8px; border: 1px solid var(--steam); outline: none;
    background: var(--milk); color: var(--espresso);
  }
  #addBox .row { display: flex; gap: 10px; }
  #addBox .row button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
  #saveNewKey { background: #2E6B1F; color: #fff; }
  #cancelNewKey { background: var(--steam); color: var(--espresso); }
  #addMsg { font-size: 0.8rem; color: var(--crema); min-height: 1.1em; text-align: center; }

  .empty { color: var(--steam); text-align: center; margin-top: 40px; font-size: 0.95rem; }
</style>
</head>
<body>

  <div id="topbar">
    <h1>🔑 Schlüsselverwaltung</h1>
    <button id="topAddBtn">+</button>
  </div>
  <div id="syncStatus">Verbinde...</div>

  <div id="app">
    <div id="cardList"></div>
    <div id="emptyMsg" class="empty" style="display:none;">Noch keine Schlüssel angelegt. Tippe oben rechts auf „+“.</div>
  </div>

  <!-- Neuer Key -->
  <div id="addOverlay">
    <div id="addBox">
      <h3>Neuen Schlüssel anlegen</h3>
      <input id="newKey" type="text" placeholder="Ably API Key">
      <div id="addMsg"></div>
      <div class="row">
        <button id="saveNewKey">Anlegen</button>
        <button id="cancelNewKey">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Name/PIN nachträglich vergeben -->
  <div id="pinOverlay" style="position:fixed;inset:0;background:rgba(28,16,8,0.85);display:none;align-items:center;justify-content:center;z-index:30;">
    <div id="addBox">
      <h3>Name &amp; PIN festlegen</h3>
      <input id="pinName" type="text" placeholder="Name (z.B. Saal 1)">
      <input id="pinCode" type="text" inputmode="numeric" placeholder="PIN zum Sperren/Entsperren">
      <div id="pinMsg" class="msg" style="text-align:center;"></div>
      <div class="row">
        <button id="savePin">Speichern &amp; kopieren</button>
        <button id="cancelPin">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Löschen bestätigen -->
  <div id="deleteOverlay" style="position:fixed;inset:0;background:rgba(28,16,8,0.85);display:none;align-items:center;justify-content:center;z-index:30;">
    <div id="addBox">
      <h3>Schlüssel löschen</h3>
      <div id="deleteText" style="text-align:center;"></div>
      <div class="row">
        <button id="confirmDelete" class="btn-delete" style="flex:1;">Löschen</button>
        <button id="cancelDelete" style="flex:1; background: var(--steam); color: var(--espresso);">Abbrechen</button>
      </div>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  let keys = {}; // { id: { name, key, code, locked } }

  // --- Sync über Ably: alle Geräte teilen sich denselben Kanal ---
  // WICHTIG: Diesen Platzhalter durch einen echten Ably API-Key ersetzen,
  // damit die Schlüsselverwaltung geräteübergreifend synchronisiert.
  const SYNC_ABLY_KEY = 'DEIN_ABLY_API_KEY_HIER_EINFÜGEN';
  const SYNC_ROOM = 'schluesselverwaltung';

  let syncAbly, syncChannel;
  let syncReady = false;
  let applyingRemoteUpdate = false;

  function setSyncStatus(text) {
    $('syncStatus').textContent = text;
  }

  function initSync() {
    if (!SYNC_ABLY_KEY || SYNC_ABLY_KEY.indexOf('HIER_EINFÜGEN') !== -1) {
      setSyncStatus('⚠️ Sync nicht eingerichtet – Keys bleiben nur auf diesem Gerät.');
      return;
    }
    setSyncStatus('Verbinde...');
    syncAbly = new Ably.Realtime(SYNC_ABLY_KEY);
    syncChannel = syncAbly.channels.get('keyvault-' + SYNC_ROOM);

    syncAbly.connection.on('connected', () => {
      syncReady = true;
      setSyncStatus('✅ Synchronisiert');
      // Beim Verbinden aktuellen Stand anfragen, damit dieses Gerät auf den neuesten Stand kommt
      syncChannel.publish('request-state', {});
    });
    syncAbly.connection.on('disconnected', () => setSyncStatus('⚠️ Verbindung unterbrochen...'));
    syncAbly.connection.on('failed', () => setSyncStatus('❌ Sync fehlgeschlagen – bitte Key prüfen.'));

    // Ein anderes Gerät hat den kompletten Datensatz aktualisiert
    syncChannel.subscribe('keys-update', (msg) => {
      applyingRemoteUpdate = true;
      keys = msg.data.keys || {};
      localStorage.setItem('keyvault_keys', JSON.stringify(keys));
      render();
      applyingRemoteUpdate = false;
    });

    // Ein neu verbundenes Gerät fragt nach dem aktuellen Stand
    syncChannel.subscribe('request-state', () => {
      if (syncReady) {
        syncChannel.publish('keys-update', { keys });
      }
    });
  }

  function loadKeys() {
    try {
      keys = JSON.parse(localStorage.getItem('keyvault_keys') || '{}');
    } catch (e) {
      keys = {};
    }
  }
  function saveKeys() {
    localStorage.setItem('keyvault_keys', JSON.stringify(keys));
    // Änderung an alle anderen Geräte senden, außer wir wenden gerade selbst
    // ein von einem anderen Gerät empfangenes Update an.
    if (syncReady && syncChannel && !applyingRemoteUpdate) {
      syncChannel.publish('keys-update', { keys });
    }
  }

  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).catch(() => copyFallback(text));
    }
    return copyFallback(text);
  }
  function copyFallback(text) {
    return new Promise((resolve, reject) => {
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        ok ? resolve() : reject(new Error('execCommand fehlgeschlagen'));
      } catch (e) {
        reject(e);
      }
    });
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function render() {
    const list = $('cardList');
    list.innerHTML = '';
    const ids = Object.keys(keys);
    $('emptyMsg').style.display = ids.length === 0 ? 'block' : 'none';

    ids.forEach(id => {
      const item = keys[id];
      const card = document.createElement('div');
      card.className = 'card';

      if (item.locked) {
        card.innerHTML = `
          <div class="name">🔒 ${escapeHtml(item.name)}</div>
          <div class="row">
            <input type="password" inputmode="numeric" placeholder="PIN eingeben" id="pinInput_${id}">
            <button class="btn-copy" data-action="copyLocked" data-id="${id}">Kopieren</button>
          </div>
          <div class="row">
            <button class="btn-unlock" data-action="release" data-id="${id}">Freigeben</button>
            <button class="btn-delete" data-action="delete" data-id="${id}">Löschen</button>
          </div>
          <div class="msg" id="msg_${id}"></div>
        `;
      } else {
        const nameHtml = item.name
          ? `🔓 ${escapeHtml(item.name)}`
          : `<span class="unnamed">Unbenannt</span>`;
        card.innerHTML = `
          <div class="name${item.name ? '' : ' unnamed'}">${nameHtml}</div>
          <div class="keyReveal" id="reveal_${id}" data-action="none" data-id="${id}">${escapeHtml(item.key)}</div>
          <div class="row">
            <button class="btn-copy" data-action="copyOpen" data-id="${id}">Key kopieren</button>
            <button class="btn-delete" data-action="delete" data-id="${id}">Löschen</button>
          </div>
          <div class="msg" id="msg_${id}">Offen sichtbar. Beim Kopieren wird eine PIN vergeben und der Key gesperrt.</div>
        `;
      }
      list.appendChild(card);
    });
  }

  $('cardList').addEventListener('click', (e) => {
    const target = e.target.closest('[data-action]');
    if (!target) return;
    const id = target.dataset.id;
    const action = target.dataset.action;
    const item = keys[id];
    if (!item) return;

    if (action === 'none') {
      return;
    } else if (action === 'copyOpen') {
      // Key ist offen: beim Kopieren muss jetzt eine PIN vergeben werden.
      openPinDialog(id, 'copy');
    } else if (action === 'copyLocked') {
      const pinInput = $('pinInput_' + id);
      if (pinInput.value === item.code) {
        copyToClipboard(item.key).then(() => {
          $('msg_' + id).textContent = 'Key kopiert – wird wieder gesperrt.';
        }).catch(() => {
          $('msg_' + id).textContent = 'Kopieren fehlgeschlagen.';
        });
      } else {
        $('msg_' + id).textContent = 'Falscher PIN.';
      }
    } else if (action === 'release') {
      const pinInput = $('pinInput_' + id);
      if (pinInput.value === item.code) {
        item.locked = false;
        item.code = '';
        saveKeys();
        render();
      } else {
        $('msg_' + id).textContent = 'Falscher PIN.';
      }
    } else if (action === 'delete') {
      openDeleteDialog(id);
    }
  });

  // --- Löschen bestätigen (eigener Dialog statt confirm()) ---
  let deleteDialogId = null;
  function openDeleteDialog(id) {
    deleteDialogId = id;
    const item = keys[id];
    const label = item.name || 'diesen unbenannten Schlüssel';
    $('deleteText').textContent = '„' + label + '“ wirklich löschen?';
    $('deleteOverlay').style.display = 'flex';
  }
  $('cancelDelete').onclick = () => { $('deleteOverlay').style.display = 'none'; };
  $('confirmDelete').onclick = () => {
    delete keys[deleteDialogId];
    saveKeys();
    render();
    $('deleteOverlay').style.display = 'none';
  };

  // --- Name/PIN festlegen (beim Kopieren eines offenen Keys) ---
  let pinDialogId = null;
  let pinDialogPurpose = null;
  function openPinDialog(id, purpose) {
    pinDialogId = id;
    pinDialogPurpose = purpose;
    $('pinName').value = '';
    $('pinCode').value = '';
    $('pinMsg').textContent = '';
    $('pinOverlay').style.display = 'flex';
  }
  $('cancelPin').onclick = () => { $('pinOverlay').style.display = 'none'; };
  $('savePin').onclick = () => {
    const item = keys[pinDialogId];
    if (!item) return;
    const name = $('pinName').value.trim();
    const code = $('pinCode').value.trim();
    if (!name || !code) {
      $('pinMsg').textContent = 'Bitte Name und PIN vergeben.';
      return;
    }
    item.name = name;
    item.code = code;
    item.locked = true;
    saveKeys();
    $('pinOverlay').style.display = 'none';
    copyToClipboard(item.key).then(() => {
      render();
      $('msg_' + pinDialogId).textContent = 'Key kopiert – jetzt mit PIN gesperrt.';
    }).catch(() => {
      render();
      $('msg_' + pinDialogId).textContent = 'Kopieren fehlgeschlagen, aber PIN gespeichert.';
    });
  };

  // --- Neuen Key anlegen ---
  $('topAddBtn').onclick = () => {
    $('addOverlay').style.display = 'flex';
    $('newKey').value = '';
    $('addMsg').textContent = '';
  };
  $('cancelNewKey').onclick = () => { $('addOverlay').style.display = 'none'; };
  $('saveNewKey').onclick = () => {
    const key = $('newKey').value.trim();
    if (!key) {
      $('addMsg').textContent = 'Bitte den Key eingeben.';
      return;
    }
    const id = 'k_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    keys[id] = { name: '', key, code: '', locked: false };
    saveKeys();
    render();
    $('addOverlay').style.display = 'none';
  };

  loadKeys();
  render();
  initSync();
</script>
</body>
</html>
