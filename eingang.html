<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }

  :root {
    --espresso:  #1C1008;
    --roast:     #3B1F0A;
    --crema:     #C8862A;
    --foam:      #F5ECD7;
    --milk:      #FBF6EE;
    --steam:     #E8D9BE;
  }

  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    transition: background-color 0.3s ease;
    background: var(--roast);
    color: var(--foam);
  }
  body.green { background: #2E6B1F; }
  body.red { background: #8A2E1F; }

  /* Steam-Animation (aus index.html übernommen) */
  .steam-row {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 20px;
  }
  .steam {
    width: 3px;
    height: 32px;
    background: linear-gradient(to top, transparent, rgba(245,236,215,.5));
    border-radius: 2px;
    animation: rise 2.4s ease-in-out infinite;
  }
  .steam:nth-child(2) { animation-delay: .6s; height: 24px; }
  .steam:nth-child(3) { animation-delay: 1.2s; height: 28px; }
  @keyframes rise {
    0%   { transform: translateY(0)   scaleX(1);   opacity: .6; }
    50%  { transform: translateY(-12px) scaleX(1.4); opacity: .3; }
    100% { transform: translateY(-24px) scaleX(.8); opacity: 0;  }
  }

  #countWrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #count {
    font-family: 'Playfair Display', serif;
    font-size: 32vw;
    font-weight: 700;
    line-height: 1;
    letter-spacing: .02em;
    padding-bottom: 6vw;
  }
  #label {
    font-size: 4vw;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.85;
    margin-top: 1vh;
    color: var(--steam);
  }

  #waitTime {
    display: none;
    align-items: center;
    gap: 8px;
    margin-top: -1vh;
    padding: 8px 18px;
    border-radius: 999px;
    background: rgba(245,236,215,0.1);
    border: 1px solid rgba(232,217,190,0.3);
    font-size: 0.95rem;
    letter-spacing: .3px;
    color: var(--steam);
  }
  #waitTime.visible { display: inline-flex; }
  #waitTime .waitDot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--crema); flex-shrink: 0;
  }
  #waitTime .waitValue { color: var(--foam); font-weight: 500; }

  /* Setup-Overlay */
  #setup {
    position: fixed; inset: 0;
    background: var(--espresso);
    display: flex; align-items: center; justify-content: center;
    z-index: 20;
  }
  #setupBox {
    width: 90%; max-width: 420px;
    background: var(--roast);
    border: 1px solid var(--steam);
    border-radius: 14px;
    padding: 32px 28px 28px;
    display: flex; flex-direction: column; gap: 14px;
  }
  #setupBox h2 {
    font-family: 'Playfair Display', serif;
    color: var(--foam); margin: 0 0 4px 0; text-align: center;
    letter-spacing: .02em;
  }
  #setupBox input {
    padding: 14px; font-size: 1rem; border-radius: 10px; border: 1px solid var(--steam); outline: none;
    background: var(--milk); color: var(--espresso);
  }
  #setupBox button {
    padding: 16px; font-size: 1.1rem; font-weight: 700; border: none;
    border-radius: 12px; cursor: pointer; background: var(--crema); color: var(--espresso);
  }
  #setupStatus { color: var(--steam); font-size: 0.85rem; text-align: center; min-height: 1.2em; }

  /* Zahnrad Button */
  #gearBtn {
    position: fixed; bottom: 16px; right: 16px;
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(28,16,8,0.45); color: var(--foam); border: none;
    font-size: 1.4rem; cursor: pointer; z-index: 10;
  }

  /* Einstellungen-Dialog */
  #settingsOverlay {
    position: fixed; inset: 0; background: rgba(28,16,8,0.8);
    display: none; align-items: center; justify-content: center; z-index: 30;
    padding: 20px 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #settingsBox {
    background: var(--roast); border: 1px solid var(--steam); border-radius: 14px; padding: 28px 24px;
    width: 90%; max-width: 380px; color: var(--foam);
    display: flex; flex-direction: column; gap: 14px;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    margin: auto;
  }
  #settingsBox h3 { font-family: 'Playfair Display', serif; margin: 0; letter-spacing: .02em; }
  #settingsBox label { font-size: 0.85rem; color: var(--steam); margin-bottom: -8px; }
  #settingsBox input {
    padding: 12px; font-size: 1rem; border-radius: 8px; border: 1px solid var(--steam); outline: none;
    background: var(--milk); color: var(--espresso);
  }
  .settingsRow { display: flex; gap: 10px; }
  .settingsRow button {
    flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer;
  }
  #saveSettings { background: #2E6B1F; color: #fff; }
  #closeSettings { background: var(--steam); color: var(--espresso); }
  #resetCount { background: #8A2E1F; color: #fff; }
  #manualMinus, #manualPlus { background: var(--crema); color: var(--espresso); }
  #manualSetCount { background: #2E6B1F; color: #fff; }
  #settingsMsg { font-size: 0.8rem; color: var(--crema); min-height: 1.2em; }

  .toggleRow {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
  }
  .switch {
    position: relative; width: 46px; height: 26px; flex-shrink: 0;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switchSlider {
    position: absolute; cursor: pointer; inset: 0;
    background: var(--steam); border-radius: 26px; transition: .2s;
  }
  .switchSlider::before {
    content: ""; position: absolute; height: 20px; width: 20px;
    left: 3px; bottom: 3px; background: var(--milk); border-radius: 50%; transition: .2s;
  }
  .switch input:checked + .switchSlider { background: #2E6B1F; }
  .switch input:checked + .switchSlider::before { transform: translateX(20px); }

  #qrToggleBtn {
    position: fixed; bottom: 16px; left: 16px;
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(28,16,8,0.45); color: var(--foam); border: none;
    font-size: 1.4rem; cursor: pointer; z-index: 10;
  }
  #qrOverlay {
    position: fixed; inset: 0; background: rgba(28,16,8,0.9);
    display: none; align-items: center; justify-content: center; z-index: 25;
    flex-direction: column; gap: 16px;
  }
  #qrOverlay canvas { border-radius: 14px; border: 1px solid var(--steam); }
  #qrOverlay p { color: var(--foam); font-size: 1rem; text-align: center; padding: 0 20px; }
  #qrOverlay button {
    padding: 12px 24px; border-radius: 10px; border: none;
    background: var(--steam); color: var(--espresso); font-weight: 700; cursor: pointer;
  }
</style>
</head>
<body>

  <!-- SETUP: erstmalige Verbindung -->
  <div id="setup">
    <div id="setupBox">
      <div class="steam-row">
        <div class="steam"></div>
        <div class="steam"></div>
        <div class="steam"></div>
      </div>
      <h2>Eingang einrichten</h2>
      <input id="apiKeyInput" type="text" placeholder="Ably API Key">
      <input id="roomInput" type="text" placeholder="Raum-Name (z.B. saal1)">
      <button id="connectBtn">Verbinden</button>
      <div id="setupStatus"></div>
    </div>
  </div>

  <div id="countWrap">
    <div id="label">Freie Plätze</div>
    <div id="count">0</div>
    <div id="waitTime"><span class="waitDot"></span>Ø Wartezeit: <span class="waitValue" id="waitValue">–</span></div>
  </div>

  <button id="gearBtn">⚙️</button>
  <button id="qrToggleBtn">📷</button>

  <div id="qrOverlay">
    <canvas id="qrCanvas"></canvas>
    <p>Mit dem Handy scannen, um Eingang/Ausgang-Klicker automatisch einzurichten.</p>
    <button id="closeQr">Schließen</button>
  </div>

  <!-- Einstellungen -->
  <div id="settingsOverlay">
    <div id="settingsBox">
      <h3>Einstellungen</h3>
      <label>Zugangscode</label>
      <input id="codeInput" type="password" inputmode="numeric" placeholder="Code eingeben">
      <div id="settingsMsg"></div>
      <div id="unlockedFields" style="display:none; flex-direction:column; gap:14px;">
        <label>Kapazität (Anzahl Plätze insgesamt)</label>
        <input id="maxInput" type="number" min="1">
        <label>Neuer Zugangscode (4-stellig)</label>
        <input id="newCodeInput" type="text" inputmode="numeric" maxlength="10" placeholder="leer lassen = unverändert">
        <div class="settingsRow">
          <button id="resetCount">Auf Kapazität zurücksetzen</button>
        </div>
        <label>Ably API Key</label>
        <input id="settingsApiKeyInput" type="text" placeholder="Ably API Key">
        <label>Raum-Name</label>
        <input id="settingsRoomInput" type="text" placeholder="Raum-Name (z.B. saal1)">
        <div class="settingsRow">
          <button id="changeAblyKey" style="background:#8A2E1F; color:#fff;">Ably-Key wechseln &amp; neu verbinden</button>
        </div>
        <label>Zähler manuell korrigieren</label>
        <div class="settingsRow">
          <button id="manualMinus">−1</button>
          <button id="manualPlus">+1</button>
        </div>
        <input id="manualCountInput" type="number" min="0" placeholder="Wert direkt setzen">
        <div class="settingsRow">
          <button id="manualSetCount">Übernehmen</button>
        </div>
        <div class="toggleRow">
          <label style="margin-bottom:0;">Ø Wartezeit anzeigen</label>
          <label class="switch">
            <input type="checkbox" id="waitTimeToggle">
            <span class="switchSlider"></span>
          </label>
        </div>
        <div class="settingsRow">
          <button id="saveSettings">Speichern</button>
          <button id="closeSettings">Schließen</button>
        </div>
      </div>
    </div>
  </div>

TMuMTAxIChiZXRhIDMpVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVMQU1FMy4xMDEgKGJldGEgMylVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//uwZAAP8AAAaQAAAAgAAA0gAAABAAABpAAAACAAADSAAAAETEFNRTMuMTAxIChiZXRhIDMpVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVUxBTUUzLjEwMSAoYmV0YSAzKVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVU=');
  entrySound.preload = 'auto';

  function beep() {
    try {
      entrySound.currentTime = 0;
      entrySound.play().catch((err) => {
        console.warn('Sound konnte nicht abgespielt werden (Autoplay-Policy?):', err);
      });
    } catch (e) { console.warn('Sound-Fehler:', e); }
  }

  function updateDisplay() {
    $('count').textContent = count;
    const full = count <= 0;
    document.body.classList.toggle('green', !full);
    document.body.classList.toggle('red', full);
    $('label').textContent = full ? 'Kein Zutritt' : 'Freie Plätze';
    updateWaitTimeDisplay();
  }

  // --- Durchschnittliche Wartezeit ---
  // Schätzung: Zeit zwischen den letzten "jemand kommt rein"-Ereignissen (decrement),
  // gleitender Durchschnitt über die letzten 10 Einlässe, multipliziert mit der
  // aktuellen Warteschlangen-Tiefe (falls Kapazität = 0, sonst nur Takt-Anzeige).
  const WAIT_SAMPLE_SIZE = 10;

  function recordEntry() {
    const now = Date.now();
    entryTimestamps.push(now);
    if (entryTimestamps.length > WAIT_SAMPLE_SIZE) entryTimestamps.shift();
    persistWaitData();
    updateWaitTimeDisplay();
  }

  function averageIntervalMs() {
    if (entryTimestamps.length < 2) return null;
    const diffs = [];
    for (let i = 1; i < entryTimestamps.length; i++) {
      diffs.push(entryTimestamps[i] - entryTimestamps[i - 1]);
    }
    const sum = diffs.reduce((a, b) => a + b, 0);
    return sum / diffs.length;
  }

  function formatDuration(ms) {
    const totalSeconds = Math.round(ms / 1000);
    const min = Math.floor(totalSeconds / 60);
    const sec = totalSeconds % 60;
    if (min <= 0) return sec + ' Sek.';
    return min + ' Min.' + (sec > 0 ? ' ' + sec + ' Sek.' : '');
  }

  function updateWaitTimeDisplay() {
    const el = $('waitTime');
    if (!waitTimeEnabled) {
      el.classList.remove('visible');
      return;
    }
    el.classList.add('visible');
    const avgMs = averageIntervalMs();
    $('waitValue').textContent = avgMs === null ? '–' : formatDuration(avgMs);
  }

  function persistWaitData() {
    const room = ($('roomInput').value || $('settingsRoomInput').value || currentRoom || '').trim();
    if (!room) return;
    try {
      localStorage.setItem('waitdata_' + room, JSON.stringify(entryTimestamps));
    } catch (e) {}
  }

  function loadWaitData(room) {
    try {
      const saved = JSON.parse(localStorage.getItem('waitdata_' + room) || '[]');
      entryTimestamps = Array.isArray(saved) ? saved : [];
    } catch (e) {
      entryTimestamps = [];
    }
  }

  function broadcastState() {
    channel.publish('state', { count, maxCapacity, accessCode });
  }

  function connect(apiKey, room) {
    apiKey = apiKey.trim();
    room = room.trim();
    localStorage.setItem('ably_key', apiKey);
    localStorage.setItem('ably_room', room);
    ably = new Ably.Realtime(apiKey);
    channel = ably.channels.get('personenzaehler-' + room);
    return new Promise((resolve, reject) => {
      ably.connection.on('connected', resolve);
      ably.connection.on('failed', reject);
    });
  }

  async function init() {
    const apiKey = $('apiKeyInput').value.trim();
    const room = $('roomInput').value.trim();
    if (!apiKey || !room) {
      $('setupStatus').textContent = 'Bitte API Key und Raum-Name eingeben.';
      return;
    }
    $('setupStatus').textContent = 'Verbinde...';
    try {
      await connect(apiKey, room);
    } catch (e) {
      $('setupStatus').textContent = 'Verbindung fehlgeschlagen.';
      return;
    }

    // Gespeicherte Einstellungen pro Raum laden
    const saved = JSON.parse(localStorage.getItem('settings_' + room) || '{}');
    if (saved.maxCapacity) maxCapacity = saved.maxCapacity;
    if (saved.accessCode) accessCode = saved.accessCode;
    if (typeof saved.count === 'number') count = saved.count;
    if (typeof saved.waitTimeEnabled === 'boolean') waitTimeEnabled = saved.waitTimeEnabled;
    loadWaitData(room);

    channel.subscribe('increment', () => {
      count = Math.max(0, count - 1);
      persistAndBroadcast();
    });
    channel.subscribe('decrement', () => {
      count = Math.min(maxCapacity, count + 1);
      persistAndBroadcast();
      recordEntry();
      beep();
    });
    channel.subscribe('request-state', () => {
      broadcastState();
    });

    $('setup').style.display = 'none';
    updateDisplay();
    broadcastState();

    // Bei Wiederverbindung (z.B. nach Netzwerkaussetzer) den State erneut senden
    ably.connection.on('connected', () => {
      broadcastState();
    });

    // Key + Raum merken, damit der QR-Code jederzeit (neu) erzeugt werden kann
    currentApiKey = apiKey;
    currentRoom = room;
    generateQr();
  }

  // --- QR-Code robust erzeugen ---
  let currentApiKey = '';
  let currentRoom = '';

  let qrWaitMs = 0;
  const QR_WAIT_TIMEOUT_MS = 6000; // nach 6s aufgeben statt endlos zu warten

  function generateQr() {
    if (!currentApiKey || !currentRoom) return;
    const qrData = JSON.stringify({ k: currentApiKey, r: currentRoom });

    // Falls das QRCode-Skript (CDN) noch nicht geladen ist, kurz warten und erneut versuchen,
    // aber nicht endlos - nach QR_WAIT_TIMEOUT_MS eine klare Fehlermeldung mit Neu-Versuch-Option zeigen.
    if (typeof QRCode === 'undefined') {
      if (qrWaitMs >= QR_WAIT_TIMEOUT_MS) {
        qrWaitMs = 0;
        $('qrOverlay').querySelector('p').innerHTML =
          'QR-Code-Bibliothek konnte nicht geladen werden (Netzwerk/Adblocker?). ' +
          '<br><button id="qrRetryBtn" style="margin-top:8px;padding:8px 16px;border-radius:8px;border:none;background:var(--crema);color:var(--espresso);font-weight:700;cursor:pointer;">Erneut versuchen</button>';
        const retryBtn = document.getElementById('qrRetryBtn');
        if (retryBtn) retryBtn.onclick = () => {
          $('qrOverlay').querySelector('p').textContent = 'QR-Code lädt...';
          generateQr();
        };
        return;
      }
      $('qrOverlay').querySelector('p').textContent = 'QR-Code lädt...';
      qrWaitMs += 300;
      setTimeout(generateQr, 300);
      return;
    }
    qrWaitMs = 0;
    try {
      QRCode.toCanvas($('qrCanvas'), qrData, { width: 280, margin: 2 }, (err) => {
        if (err) {
          console.error(err);
          $('qrOverlay').querySelector('p').textContent =
            'QR-Code konnte nicht erzeugt werden. Bitte Seite neu laden.';
        } else {
          $('qrOverlay').querySelector('p').textContent =
            'Mit dem Handy scannen, um Eingang/Ausgang-Klicker automatisch einzurichten.';
        }
      });
    } catch (e) {
      console.error(e);
      $('qrOverlay').querySelector('p').textContent =
        'QR-Code konnte nicht erzeugt werden. Bitte Seite neu laden.';
    }
  }

  function persistAndBroadcast() {
    const room = $('roomInput').value.trim();
    localStorage.setItem('settings_' + room, JSON.stringify({ count, maxCapacity, accessCode, waitTimeEnabled }));
    updateDisplay();
    broadcastState();
  }

  $('connectBtn').onclick = () => {
    // Erste Nutzerinteraktion: AudioContext entsperren, damit spätere Pieptöne funktionieren
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch (e) {}
    init();
  };

  // --- Auto-Reconnect: wenn Key+Raum schon bekannt sind, direkt verbinden ---
  (function autoConnect() {
    const savedKey = localStorage.getItem('ably_key');
    const savedRoom = localStorage.getItem('ably_room');
    if (savedKey && savedRoom) {
      $('setupStatus').textContent = 'Verbinde automatisch...';
      init();
    }
  })();

  // --- Einstellungen-Dialog ---
  // Fallback: falls die Seite per Auto-Reconnect ohne Klick verbunden hat,
  // Audio beim ersten Tastendruck/Tap irgendwo auf der Seite entsperren
  document.addEventListener('pointerdown', function unlockAudioOnce() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch (e) {}
    // Das <audio>-Element selbst muss ebenfalls einmal in einer echten
    // Nutzerinteraktion gestartet werden, sonst bleibt entrySound.play()
    // in Chrome/Safari dauerhaft stumm blockiert (Autoplay-Policy).
    try {
      entrySound.muted = true;
      entrySound.play().then(() => {
        entrySound.pause();
        entrySound.currentTime = 0;
        entrySound.muted = false;
      }).catch(() => {
        entrySound.muted = false;
      });
    } catch (e) {}
    document.removeEventListener('pointerdown', unlockAudioOnce);
  }, { once: true });

  $('gearBtn').onclick = () => {
    $('settingsOverlay').style.display = 'flex';
    $('codeInput').value = '';
    $('settingsMsg').textContent = '';
    $('unlockedFields').style.display = 'none';
  };
  $('closeSettings').onclick = () => {
    $('settingsOverlay').style.display = 'none';
  };
  $('codeInput').addEventListener('input', () => {
    if ($('codeInput').value === accessCode) {
      $('unlockedFields').style.display = 'flex';
      $('maxInput').value = maxCapacity;
      $('settingsApiKeyInput').value = localStorage.getItem('ably_key') || '';
      $('settingsRoomInput').value = localStorage.getItem('ably_room') || '';
      $('waitTimeToggle').checked = waitTimeEnabled;
      $('settingsMsg').textContent = 'Entsperrt.';
    } else {
      $('unlockedFields').style.display = 'none';
    }
  });
  $('waitTimeToggle').addEventListener('change', () => {
    waitTimeEnabled = $('waitTimeToggle').checked;
    persistAndBroadcast();
    $('settingsMsg').textContent = waitTimeEnabled ? 'Wartezeit-Anzeige aktiviert.' : 'Wartezeit-Anzeige deaktiviert.';
  });
  $('resetCount').onclick = () => {
    count = maxCapacity;
    persistAndBroadcast();
    $('settingsMsg').textContent = 'Auf Kapazität zurückgesetzt.';
  };
  $('qrToggleBtn').onclick = () => {
    $('qrOverlay').style.display = 'flex';
    generateQr();
  };
  $('closeQr').onclick = () => {
    $('qrOverlay').style.display = 'none';
  };

  $('saveSettings').onclick = () => {
    const newMax = parseInt($('maxInput').value, 10);
    if (newMax > 0) maxCapacity = newMax;
    const newCode = $('newCodeInput').value.trim();
    if (newCode) accessCode = newCode;
    persistAndBroadcast();
    $('settingsMsg').textContent = 'Gespeichert.';
    $('newCodeInput').value = '';
  };

  // --- Ably-Key wechseln ---
  $('changeAblyKey').onclick = async () => {
    const newKey = $('settingsApiKeyInput').value.trim();
    const newRoom = $('settingsRoomInput').value.trim();
    if (!newKey || !newRoom) {
      $('settingsMsg').textContent = 'Bitte Key und Raum-Name eingeben.';
      return;
    }
    $('settingsMsg').textContent = 'Verbinde mit neuem Key...';

    if (ably) {
      try { channel.unsubscribe(); } catch (e) {}
      try { ably.close(); } catch (e) {}
    }

    try {
      await connect(newKey, newRoom);
    } catch (e) {
      $('settingsMsg').textContent = 'Verbindung fehlgeschlagen. Bitte Key/Raum prüfen.';
      return;
    }

    const saved = JSON.parse(localStorage.getItem('settings_' + newRoom) || '{}');
    if (saved.maxCapacity) maxCapacity = saved.maxCapacity;
    if (saved.accessCode) accessCode = saved.accessCode;
    if (typeof saved.count === 'number') count = saved.count;
    if (typeof saved.waitTimeEnabled === 'boolean') waitTimeEnabled = saved.waitTimeEnabled;
    loadWaitData(newRoom);

    channel.subscribe('increment', () => {
      count = Math.max(0, count - 1);
      persistAndBroadcast();
    });
    channel.subscribe('decrement', () => {
      count = Math.min(maxCapacity, count + 1);
      persistAndBroadcast();
      recordEntry();
      beep();
    });
    channel.subscribe('request-state', () => {
      broadcastState();
    });
    ably.connection.on('connected', () => {
      broadcastState();
    });

    currentApiKey = newKey;
    currentRoom = newRoom;
    updateDisplay();
    broadcastState();
    generateQr();

    $('settingsMsg').textContent = 'Ably-Key gewechselt und neu verbunden.';
  };

  // --- Manuelle Korrektur ---
  $('manualMinus').onclick = () => {
    count = Math.max(0, count - 1);
    persistAndBroadcast();
    $('settingsMsg').textContent = 'Zähler um 1 verringert.';
  };
  $('manualPlus').onclick = () => {
    count = Math.min(maxCapacity, count + 1);
    persistAndBroadcast();
    $('settingsMsg').textContent = 'Zähler um 1 erhöht.';
  };
  $('manualSetCount').onclick = () => {
    const newCount = parseInt($('manualCountInput').value, 10);
    if (!isNaN(newCount) && newCount >= 0) {
      count = Math.min(maxCapacity, newCount);
      persistAndBroadcast();
      $('settingsMsg').textContent = 'Zähler auf ' + count + ' gesetzt.';
      $('manualCountInput').value = '';
    } else {
      $('settingsMsg').textContent = 'Bitte gültige Zahl eingeben.';
    }
  };
</script>
</body>
</html>
