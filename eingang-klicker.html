<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eingang Klicker – Personenzähler</title>
<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }

  :root {
    --espresso:  #1C1008;
    --roast:     #3B1F0A;
    --crema:     #C8862A;
    --foam:      #F5ECD7;
    --milk:      #FBF6EE;
    --steam:     #E8D9BE;
  }

  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--espresso); color: var(--foam);
    overflow: hidden;
  }

  /* Steam-Animation (aus index.html übernommen) */
  .steam-row {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 20px;
  }
  .steam {
    width: 3px;
    height: 32px;
    background: linear-gradient(to top, transparent, rgba(245,236,215,.5));
    border-radius: 2px;
    animation: rise 2.4s ease-in-out infinite;
  }
  .steam:nth-child(2) { animation-delay: .6s; height: 24px; }
  .steam:nth-child(3) { animation-delay: 1.2s; height: 28px; }
  @keyframes rise {
    0%   { transform: translateY(0)   scaleX(1);   opacity: .6; }
    50%  { transform: translateY(-12px) scaleX(1.4); opacity: .3; }
    100% { transform: translateY(-24px) scaleX(.8); opacity: 0;  }
  }

  #setup {
    position: fixed; inset: 0;
    background: var(--espresso);
    display: flex; align-items: center; justify-content: center;
    z-index: 20;
  }
  #setupBox {
    width: 90%; max-width: 420px;
    background: var(--roast);
    border: 1px solid var(--steam);
    border-radius: 14px;
    padding: 32px 28px 28px;
    display: flex; flex-direction: column; gap: 14px;
  }
  #setupBox h2 { font-family: 'Playfair Display', serif; margin: 0 0 4px 0; text-align: center; letter-spacing: .02em; }
  #setupBox input {
    padding: 14px; font-size: 1rem; border-radius: 10px; border: 1px solid var(--steam); outline: none;
    background: var(--milk); color: var(--espresso);
  }
  #setupBox button {
    padding: 16px; font-size: 1.1rem; font-weight: 700; border: none;
    border-radius: 12px; cursor: pointer; background: var(--crema); color: var(--espresso);
  }
  #setupStatus { color: var(--steam); font-size: 0.85rem; text-align: center; min-height: 1.2em; }
  #scanBtn, #toggleManualBtn {
    padding: 16px; font-size: 1.1rem; font-weight: 700; border: none;
    border-radius: 12px; cursor: pointer; background: var(--roast); color: var(--foam);
  }

  #clickScreen {
    display: none;
    width: 100%; height: 100vh;
    align-items: center; justify-content: center;
  }
  #clickBtn {
    width: 90vw; height: 90vh;
    font-family: 'Playfair Display', serif;
    font-size: 4rem; font-weight: 700;
    border: none; border-radius: 24px;
    cursor: pointer; background: #2E6B1F; color: var(--foam);
    transition: transform 0.1s ease;
  }
  #clickBtn:active { transform: scale(0.96); background: #234F17; }
  #flash {
    position: fixed; inset: 0; background: var(--foam); opacity: 0;
    pointer-events: none; transition: opacity 0.15s ease;
  }

  /* Zahnrad Button */
  #gearBtn {
    position: fixed; bottom: 16px; right: 16px;
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(28,16,8,0.45); color: var(--foam); border: none;
    font-size: 1.4rem; cursor: pointer; z-index: 10;
  }

  /* Kleine Anzeige des aktuellen Zählerstands (wie am Eingang-Bildschirm) */
  #countBadge {
    position: fixed;
    top: 16px; right: 16px;
    background: rgba(28,16,8,0.55);
    border: 1px solid var(--steam);
    border-radius: 14px;
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    z-index: 10;
    pointer-events: none;
    transform: scale(var(--badgeScale, 1));
    transform-origin: top right;
  }
  #countBadge .value {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    line-height: 1;
    color: var(--foam);
  }
  #countBadge .label {
    font-size: 0.6rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--steam);
    opacity: 0.85;
  }

  /* Ziehgriff zum Skalieren des Badges (nur sichtbar im Größen-Anpassen-Modus) */
  #countBadge.resizable {
    pointer-events: auto;
    border-color: var(--crema);
    box-shadow: 0 0 0 2px rgba(200,134,42,0.35);
  }
  #badgeResizeHandle {
    display: none;
    position: absolute;
    bottom: -10px; left: -10px;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--crema);
    border: 2px solid var(--espresso);
    cursor: nwse-resize;
    touch-action: none;
  }
  #countBadge.resizable #badgeResizeHandle {
    display: block;
  }

  /* Einstellungen-Dialog */
  #settingsOverlay {
    position: fixed; inset: 0; background: rgba(28,16,8,0.8);
    display: none; align-items: center; justify-content: center; z-index: 30;
    padding: 20px 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #settingsBox {
    background: var(--roast); border: 1px solid var(--steam); border-radius: 14px; padding: 28px 24px;
    width: 90%; max-width: 380px; color: var(--foam);
    display: flex; flex-direction: column; gap: 14px;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    margin: auto;
  }
  #settingsBox h3 { font-family: 'Playfair Display', serif; margin: 0; letter-spacing: .02em; }
  #settingsBox label { font-size: 0.85rem; color: var(--steam); margin-bottom: -8px; }
  #settingsBox input {
    padding: 12px; font-size: 1rem; border-radius: 8px; border: 1px solid var(--steam); outline: none;
    background: var(--milk); color: var(--espresso);
  }
  .settingsRow { display: flex; gap: 10px; }
  .settingsRow button {
    flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer;
  }
  #closeSettings { background: var(--steam); color: var(--espresso); }
  #manualMinus, #manualPlus { background: var(--crema); color: var(--espresso); }
  #manualSetCount { background: #2E6B1F; color: #fff; }
  #settingsMsg { font-size: 0.8rem; color: var(--crema); min-height: 1.2em; }
</style>
</head>
<body>

  <div id="setup">
    <div id="setupBox">
      <div class="steam-row">
        <div class="steam"></div>
        <div class="steam"></div>
        <div class="steam"></div>
      </div>
      <h2>Eingang-Klicker einrichten</h2>
      <video id="scanVideo" playsinline autoplay muted style="width:100%;border-radius:12px;"></video>
      <div id="scanHint" style="color:#aaa;font-size:0.85rem;text-align:center;">Kamera wird gestartet...</div>
      <button id="toggleManualBtn" style="background:#555;">✏️ Manuell eingeben</button>
      <div id="manualFields" style="display:none; flex-direction:column; gap:14px;">
        <input id="apiKeyInput" type="text" placeholder="Ably API Key">
        <input id="roomInput" type="text" placeholder="Raum-Name (z.B. saal1)">
        <button id="connectBtn">Verbinden</button>
      </div>
      <div id="setupStatus"></div>
    </div>
  </div>

  <div id="clickScreen">
    <button id="clickBtn">REIN</button>
  </div>
  <div id="flash"></div>

  <div id="countBadge">
    <div class="value" id="countBadgeValue">0</div>
    <div class="label">frei</div>
    <div id="badgeResizeHandle"></div>
  </div>

  <button id="gearBtn">⚙️</button>

  <!-- Einstellungen -->
  <div id="settingsOverlay">
    <div id="settingsBox">
      <h3>Einstellungen</h3>
      <label>Zugangscode</label>
      <input id="codeInput" type="password" inputmode="numeric" placeholder="Code eingeben">
      <div id="settingsMsg"></div>
      <div id="unlockedFields" style="display:none; flex-direction:column; gap:14px;">
        <label>Ably API Key</label>
        <input id="settingsApiKeyInput" type="text" placeholder="Ably API Key">
        <label>Raum-Name</label>
        <input id="settingsRoomInput" type="text" placeholder="Raum-Name (z.B. saal1)">
        <div class="settingsRow">
          <button id="changeAblyKey" style="background:#8A2E1F; color:#fff;">Ably-Key wechseln &amp; neu verbinden</button>
        </div>
        <label>Zähler manuell korrigieren</label>
        <div class="settingsRow">
          <button id="manualMinus">−1</button>
          <button id="manualPlus">+1</button>
        </div>
        <input id="manualCountInput" type="number" min="0" placeholder="Wert direkt setzen">
        <div class="settingsRow">
          <button id="manualSetCount">Übernehmen</button>
        </div>
        <div class="settingsRow">
          <button id="toggleBadgeResize">📐 Anzeige-Größe anpassen</button>
        </div>
        <div class="settingsRow">
          <button id="closeSettings">Schließen</button>
        </div>
      </div>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  let ably, channel;
  let count = 0;
  let accessCode = '1234';

  function updateCountBadge() {
    $('countBadgeValue').textContent = count;
  }
  function setCount(newCount) {
    count = newCount;
    updateCountBadge();
  }

  $('apiKeyInput').value = localStorage.getItem('ably_key') || '';
  $('roomInput').value = localStorage.getItem('ably_room') || '';

  function connect(apiKey, room) {
    apiKey = apiKey.trim();
    room = room.trim();
    localStorage.setItem('ably_key', apiKey);
    localStorage.setItem('ably_room', room);
    ably = new Ably.Realtime(apiKey);
    channel = ably.channels.get('personenzaehler-' + room);
    return new Promise((resolve, reject) => {
      ably.connection.on('connected', resolve);
      ably.connection.on('failed', reject);
    });
  }

  async function init() {
    const apiKey = $('apiKeyInput').value.trim();
    const room = $('roomInput').value.trim();
    if (!apiKey || !room) {
      $('setupStatus').textContent = 'Bitte API Key und Raum-Name eingeben.';
      return;
    }
    $('setupStatus').textContent = 'Verbinde...';
    try {
      await connect(apiKey, room);
    } catch (e) {
      $('setupStatus').textContent = 'Verbindung fehlgeschlagen.';
      return;
    }
    // Gespeicherte Einstellungen pro Raum laden (für Zugangscode)
    const saved = JSON.parse(localStorage.getItem('settings_' + room) || '{}');
    if (saved.accessCode) accessCode = saved.accessCode;
    if (typeof saved.count === 'number') setCount(saved.count);

    channel.subscribe('state', (msg) => {
      if (typeof msg.data.count === 'number') setCount(msg.data.count);
      if (msg.data.accessCode) accessCode = msg.data.accessCode;
    });
    channel.publish('request-state', {});

    // Bei Wiederverbindung (z.B. nach Netzwerkaussetzer) den Stand erneut anfragen
    ably.connection.on('connected', () => {
      channel.publish('request-state', {});
    });

    $('setup').style.display = 'none';
    $('clickScreen').style.display = 'flex';
  }

  $('connectBtn').onclick = init;

  // --- Auto-Reconnect: wenn Key+Raum schon bekannt sind, direkt verbinden ---
  (function autoConnect() {
    const savedKey = localStorage.getItem('ably_key');
    const savedRoom = localStorage.getItem('ably_room');
    if (savedKey && savedRoom) {
      $('setupStatus').textContent = 'Verbinde automatisch...';
      init();
    }
  })();

  $('toggleManualBtn').onclick = () => {
    const manualVisible = $('manualFields').style.display === 'flex';
    if (manualVisible) {
      $('manualFields').style.display = 'none';
      $('toggleManualBtn').textContent = '✏️ Manuell eingeben';
      startScan();
    } else {
      stopScan();
      $('manualFields').style.display = 'flex';
      $('toggleManualBtn').textContent = '📷 QR-Code scannen';
    }
  };

  // --- QR-Scan ---
  let scanStream = null;
  let scanRAF = null;

  async function startScan() {
    try {
      scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    } catch (e) {
      $('scanHint').textContent = 'Kamera-Zugriff nicht möglich. Bitte manuell eintragen.';
      return;
    }
    const video = $('scanVideo');
    video.srcObject = scanStream;
    $('scanHint').textContent = 'Auf den QR-Code am Eingang-Bildschirm richten...';
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    function tick() {
      if (!scanStream) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) {
          try {
            const parsed = JSON.parse(code.data);
            if (parsed.k && parsed.r) {
              $('apiKeyInput').value = parsed.k;
              $('roomInput').value = parsed.r;
              stopScan();
              init();
              return;
            }
          } catch (e) { /* kein gültiger QR-Inhalt, weiter scannen */ }
        }
      }
      scanRAF = requestAnimationFrame(tick);
    }
    scanRAF = requestAnimationFrame(tick);
  }

  function stopScan() {
    if (scanRAF) cancelAnimationFrame(scanRAF);
    if (scanStream) { scanStream.getTracks().forEach(t => t.stop()); scanStream = null; }
  }

  // Kamera-Scan nur starten, wenn keine gespeicherte Verbindung existiert
  if (!(localStorage.getItem('ably_key') && localStorage.getItem('ably_room'))) {
    startScan();
  }

  let clickPending = false;

  $('clickBtn').onclick = () => {
    if (clickPending) return;
    if (!channel || !ably || ably.connection.state !== 'connected') {
      $('clickBtn').textContent = 'Keine Verbindung...';
      setTimeout(() => { $('clickBtn').textContent = 'REIN'; }, 1500);
      return;
    }
    clickPending = true;
    const flash = $('flash');
    flash.style.opacity = '0.3';
    setTimeout(() => flash.style.opacity = '0', 150);

    channel.publish('increment', {}, (err) => {
      clickPending = false;
      if (err) {
        $('clickBtn').textContent = 'Fehler – erneut tippen';
        setTimeout(() => { $('clickBtn').textContent = 'REIN'; }, 1500);
      }
    });

    setTimeout(() => { clickPending = false; }, 4000);
  };

  // --- Anzeige-Größe (Badge) laden & Resize per Ziehgriff ---
  let badgeScale = parseFloat(localStorage.getItem('badgeScale')) || 1;
  document.documentElement.style.setProperty('--badgeScale', badgeScale);

  function setBadgeScale(scale) {
    badgeScale = Math.min(3, Math.max(0.5, scale));
    document.documentElement.style.setProperty('--badgeScale', badgeScale);
    localStorage.setItem('badgeScale', badgeScale);
  }

  $('toggleBadgeResize').onclick = () => {
    const active = $('countBadge').classList.toggle('resizable');
    $('toggleBadgeResize').textContent = active
      ? '✅ Größe anpassen aktiv (am Griff ziehen)'
      : '📐 Anzeige-Größe anpassen';
  };

  (function setupBadgeResize() {
    const badge = $('countBadge');
    const handle = $('badgeResizeHandle');
    let dragging = false;
    let startDist = 0;
    let startScale = 1;

    function pointFromEvent(e) {
      if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    }

    function onDragStart(e) {
      dragging = true;
      const rect = badge.getBoundingClientRect();
      const originX = rect.right;
      const originY = rect.top;
      const p = pointFromEvent(e);
      startDist = Math.hypot(p.x - originX, p.y - originY) || 1;
      startScale = badgeScale;
      e.preventDefault();
    }

    function onDragMove(e) {
      if (!dragging) return;
      const rect = badge.getBoundingClientRect();
      // Ecke oben-rechts ist der feste Ankerpunkt (transform-origin: top right)
      const originX = rect.right;
      const originY = rect.top;
      const p = pointFromEvent(e);
      const dist = Math.hypot(p.x - originX, p.y - originY) || 1;
      setBadgeScale(startScale * (dist / startDist));
      e.preventDefault();
    }

    function onDragEnd() {
      dragging = false;
    }

    handle.addEventListener('mousedown', onDragStart);
    handle.addEventListener('touchstart', onDragStart, { passive: false });
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('touchmove', onDragMove, { passive: false });
    window.addEventListener('mouseup', onDragEnd);
    window.addEventListener('touchend', onDragEnd);
  })();

  // --- Einstellungen-Dialog ---
  $('gearBtn').onclick = () => {
    $('settingsOverlay').style.display = 'flex';
    $('codeInput').value = '';
    $('settingsMsg').textContent = '';
    $('unlockedFields').style.display = 'none';
    if (channel) channel.publish('request-state', {});
  };
  $('closeSettings').onclick = () => {
    $('settingsOverlay').style.display = 'none';
    $('countBadge').classList.remove('resizable');
    $('toggleBadgeResize').textContent = '📐 Anzeige-Größe anpassen';
  };
  $('codeInput').addEventListener('input', () => {
    if ($('codeInput').value === accessCode) {
      $('unlockedFields').style.display = 'flex';
      $('settingsMsg').textContent = 'Entsperrt.';
      $('settingsApiKeyInput').value = localStorage.getItem('ably_key') || '';
      $('settingsRoomInput').value = localStorage.getItem('ably_room') || '';
    } else {
      $('unlockedFields').style.display = 'none';
    }
  });

  // --- Ably-Key wechseln & neu verbinden ---
  $('changeAblyKey').onclick = async () => {
    const newKey = $('settingsApiKeyInput').value.trim();
    const newRoom = $('settingsRoomInput').value.trim();
    if (!newKey || !newRoom) {
      $('settingsMsg').textContent = 'Bitte API Key und Raum-Name eingeben.';
      return;
    }
    $('settingsMsg').textContent = 'Verbinde neu...';
    try {
      if (ably) ably.close();
      await connect(newKey, newRoom);
      $('settingsMsg').textContent = 'Neu verbunden.';
    } catch (e) {
      $('settingsMsg').textContent = 'Verbindung fehlgeschlagen.';
    }
  };

  // --- Manuelle Korrektur (Klickfehler beheben) ---
  $('manualMinus').onclick = () => {
    if (!channel) return;
    channel.publish('decrement', {});
    count = Math.max(0, count - 1);
    setCount(count);
    $('settingsMsg').textContent = 'Zähler um 1 verringert.';
  };
  $('manualPlus').onclick = () => {
    if (!channel) return;
    channel.publish('increment', {});
    count = count + 1;
    setCount(count);
    $('settingsMsg').textContent = 'Zähler um 1 erhöht.';
  };
  $('manualSetCount').onclick = () => {
    if (!channel) return;
    const newCount = parseInt($('manualCountInput').value, 10);
    if (!isNaN(newCount) && newCount >= 0) {
      const diff = newCount - count;
      const steps = Math.abs(diff);
      const eventName = diff < 0 ? 'decrement' : 'increment';
      for (let i = 0; i < steps; i++) {
        channel.publish(eventName, {});
      }
      count = newCount;
      setCount(count);
      $('settingsMsg').textContent = 'Zähler auf ' + newCount + ' gesetzt.';
      $('manualCountInput').value = '';
    } else {
      $('settingsMsg').textContent = 'Bitte gültige Zahl eingeben.';
    }
  };
</script>
</body>
</html>
